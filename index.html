<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Non-blocking storage warning banner (hidden by default) -->
    <div id="storage-warning" class="storage-warning" hidden>
      ⚠️ Local Storage is unavailable. Your data will not be saved this session.
    </div>

    <main class="dashboard">
      <!-- Widget 1: Greeting -->
      <section
        id="greeting-widget"
        class="widget greeting-widget"
        aria-label="Greeting"
      >
        <div id="greeting-time" class="greeting-time" aria-live="polite"></div>
        <div id="greeting-date" class="greeting-date"></div>
        <div id="greeting-text" class="greeting-text" aria-live="polite"></div>
      </section>

      <!-- Widget 2: Focus Timer -->
      <section
        id="timer-widget"
        class="widget timer-widget"
        aria-label="Focus Timer"
      >
        <h2 class="widget-title">Focus Timer</h2>
        <div
          id="timer-display"
          class="timer-display"
          aria-live="polite"
          aria-label="Timer display"
        >
          00:00
        </div>
        <div class="timer-controls">
          <button id="timer-start" class="btn btn-primary" type="button">
            Start
          </button>
          <button
            id="timer-stop"
            class="btn btn-secondary"
            type="button"
            disabled
          >
            Stop
          </button>
          <button id="timer-reset" class="btn btn-secondary" type="button">
            Reset
          </button>
        </div>
      </section>

      <!-- Widget 3: To-Do List -->
      <section
        id="todo-widget"
        class="widget todo-widget"
        aria-label="To-Do List"
      >
        <h2 class="widget-title">To-Do List</h2>
        <form id="todo-form" class="add-form" novalidate>
          <label for="todo-input" class="sr-only">New task</label>
          <input
            id="todo-input"
            class="text-input"
            type="text"
            placeholder="Add a new task…"
            autocomplete="off"
            aria-describedby="todo-error"
          />
          <button class="btn btn-primary" type="submit">Add</button>
          <span
            id="todo-error"
            class="error-msg"
            role="alert"
            aria-live="assertive"
          ></span>
        </form>
        <ul id="todo-list" class="task-list" aria-label="Tasks"></ul>
      </section>

      <!-- Widget 4: Quick Links Panel -->
      <section
        id="links-widget"
        class="widget links-widget"
        aria-label="Quick Links"
      >
        <h2 class="widget-title">Quick Links</h2>
        <form id="links-form" class="add-form" novalidate>
          <label for="link-label-input" class="sr-only">Link label</label>
          <input
            id="link-label-input"
            class="text-input"
            type="text"
            placeholder="Label"
            autocomplete="off"
            aria-describedby="links-error"
          />
          <label for="link-url-input" class="sr-only">Link URL</label>
          <input
            id="link-url-input"
            class="text-input"
            type="url"
            placeholder="https://example.com"
            autocomplete="off"
            aria-describedby="links-error"
          />
          <button class="btn btn-primary" type="submit">Add</button>
          <span
            id="links-error"
            class="error-msg"
            role="alert"
            aria-live="assertive"
          ></span>
        </form>
        <div
          id="links-container"
          class="links-container"
          aria-label="Saved links"
        ></div>
      </section>

      <!-- Widget 5: Settings Bar -->
      <section
        id="settings-widget"
        class="widget settings-widget"
        aria-label="Settings"
      >
        <h2 class="widget-title">Settings</h2>

        <div class="settings-group">
          <label for="settings-name" class="settings-label">Your Name</label>
          <input
            id="settings-name"
            class="text-input"
            type="text"
            placeholder="Enter your name"
            autocomplete="name"
            aria-describedby="settings-name-error"
          />
          <button
            id="settings-name-save"
            class="btn btn-secondary"
            type="button"
          >
            Save
          </button>
          <span
            id="settings-name-error"
            class="error-msg"
            role="alert"
            aria-live="assertive"
          ></span>
        </div>

        <div class="settings-group">
          <label for="settings-pomodoro" class="settings-label"
            >Pomodoro Duration (minutes)</label
          >
          <input
            id="settings-pomodoro"
            class="text-input number-input"
            type="number"
            min="1"
            max="120"
            placeholder="25"
            aria-describedby="settings-pomodoro-error"
          />
          <button
            id="settings-pomodoro-save"
            class="btn btn-secondary"
            type="button"
          >
            Save
          </button>
          <span
            id="settings-pomodoro-error"
            class="error-msg"
            role="alert"
            aria-live="assertive"
          ></span>
        </div>

        <div class="settings-group">
          <button
            id="theme-toggle"
            class="btn btn-secondary"
            type="button"
            aria-label="Toggle light/dark theme"
          >
            Toggle Theme
          </button>
        </div>
      </section>
    </main>

    <script src="js/app.js" defer></script>
  </body>
</html>
